<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sourdough Bakery</title>

  <style>
    body {
      font-family: Arial;
      background: #faf7f2;
      margin: 0;
    }

    header {
      background: #8b5e3c;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #8b5e3c;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    #cart {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Sourdough Bakery</h1>
  <p>Fresh baked goods 🍞</p>
</header>

<div class="products">

  <div class="product">
    <img src="bread.jpg">
    <h3>Classic Sourdough</h3>
    <p>$8</p>
    <button onclick="addToCart('Sourdough Bread', 8)">Add to Cart</button>
  </div>

  <div class="product">
    <img src="bagel.jpg">
    <h3>Bagels (4)</h3>
    <p>$6</p>
    <button onclick="addToCart('Bagels', 6)">Add to Cart</button>
  </div>

</div>

<div id="cart">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <p><strong>Total: $<span id="total">0</span></strong></p>

  <button onclick="checkout()">Checkout</button>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
  cart.push({ name, price });
  total += price;
  renderCart();
}

function renderCart() {
  const list = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");

  list.innerHTML = "";

  cart.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.name + " - $" + item.price;
    list.appendChild(li);
  });

  totalEl.textContent = total;
}

function checkout() {
  if (cart.length === 0) {
    alert("Your cart is empty!");
    return;
  }

  alert("You’ll now be redirected to payment.\n\nIMPORTANT: Make sure the amount matches your order.");

  window.location.href = "https://buy.stripe.com/00w8wQ1eY9jUbLNb0jdEs00";
}
</script>

</body>
</html>
