<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sweet Starter Sourdough</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #2b1d17; /* DARK ESPRESSO */
      font-family: 'Inter', sans-serif;
      color: #f3e9dc; /* creamy text */
    }

    header {
      background: #3e2723; /* dark mocha */
      text-align: center;
      padding: 60px 20px;
      border-bottom: 3px solid #a67c52;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3em;
      margin: 0;
      color: #f8f1e5;
    }

    header p {
      margin-top: 10px;
      color: #d7ccc8;
    }

    .about {
      text-align: center;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }

    .products {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      padding: 30px;
    }

    .product {
      background: #4e342e; /* rich brown */
      border-radius: 20px;
      width: 260px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      text-align: center;
      transition: 0.2s;
    }

    .product:hover {
      transform: scale(1.05);
    }

    .product img {
      width: 100%;
      border-radius: 15px;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      color: #f3e9dc;
    }

    button {
      background: #a67c52; /* latte brown */
      color: #2b1d17;
      border: none;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
    }

    button:hover {
      background: #c49a6c;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #bcaaa4;
    }
  </style>
</head>

<body>

<header>
  <h1>Sweet Starter Sourdough 🍞</h1>
  <p>Dark roast vibes • Fresh baked • Homemade comfort</p>
</header>

<section class="about">
  <h2>Welcome ☕</h2>
  <p>
    Small-batch sourdough baked fresh with love.
    Deep flavor, slow fermentation, and perfect with your morning coffee.
  </p>
</section>

<section class="products">

  <div class="product">
    <img src="bread.jpg">
    <h3>Classic Sourdough</h3>
    <p>$8</p>
    <button onclick="buyBread()">Order Now</button>
  </div>

  <div class="product">
    <img src="bagel.jpg">
    <h3>Bagels (4)</h3>
    <p>$6</p>
    <button onclick="buyBagels()">Order Now</button>
  </div>

</section>

<footer>
  <p>☕ Baked fresh • Thank you for supporting homemade</p>
</footer>

<script>
function buyBread() {
  window.location.href = "https://buy.stripe.com/00w8wQ1eY9jUbLNb0jdEs00";
}

function buyBagels() {
  window.location.href = "https://buy.stripe.com/00w8wQ1eY9jUbLNb0jdEs00";
}
</script>

</body>
</html>
